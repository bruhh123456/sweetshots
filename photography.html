<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Shoots | Kawaii Design Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffeef8; 
            background-image: 
                radial-gradient(#ffb6c1 1px, transparent 1px),
                url("https://i.pinimg.com/originals/3d/8c/73/3d8c73087397f00d832960616b6786a5.jpg");
            background-repeat: repeat;
            background-size: 40px 40px, 200px;
            background-attachment: fixed;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- KAWAII NAV --- */
        nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 6px double #ff85a1;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #ff4d6d;
            font-weight: bold;
            margin: 0 20px;
            transition: 0.3s;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
        }

        nav a:hover { color: #ff85a1; transform: scale(1.1); display: inline-block; }

        /* --- THE STAGE --- */
        .stage {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            position: relative;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff4d6d;
            font-size: 4rem;
            text-shadow: 4px 4px 0px #ffffff, 6px 6px 0px #ffb6c1;
            margin-bottom: 60px;
        }

        /* The Kawaii Ribbon String */
        .stage::before {
            content: '🎀 ──────── 🎀 ──────── 🎀 ──────── 🎀';
            position: absolute;
            top: 145px;
            left: 0;
            width: 100%;
            color: #ff4d6d;
            font-size: 20px;
            z-index: 0;
            opacity: 0.6;
        }

        /* --- THE LACE PHOTO HANGER --- */
        .photo-hanger {
            display: inline-block;
            background: white;
            padding: 20px 20px 70px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(255, 133, 161, 0.3);
            position: relative;
            z-index: 5;
            transform-origin: top center;
            animation: swing 4s infinite ease-in-out;
            max-width: 500px;
            width: 95%;
            border: 8px solid #fff;
            outline: 3px dashed #ffb6c1;
            outline-offset: -12px;
        }

        .clip {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: #ffb6c1;
            border-radius: 50%;
            z-index: 10;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
        }
        .clip::after { content: '🐱'; font-size: 35px; line-height: 70px; display: block; }

        @keyframes swing {
            0% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
            100% { transform: rotate(-3deg); }
        }

        /* Slide Transitions */
        .mySlides {
            display: none;
            animation: bounceIn 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .mySlides img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            display: block;
        }

        .caption-box {
            margin-top: 25px;
        }

        .caption {
            font-family: 'Fredoka One', cursive;
            color: #ff4d6d;
            font-size: 1.6rem;
            background: #fff0f5;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .counter {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: #ff85a1;
            font-size: 0.9rem;
            display: block;
        }

        /* --- HEART BUTTONS --- */
        .nav-btns {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            background: #fff;
            border: 4px solid #ffb6c1;
            padding: 15px 35px;
            border-radius: 30px;
            color: #ff4d6d;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 0 #ffb6c1;
            outline: none;
        }

        .btn:hover {
            background: #ff4d6d;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 0 #c9184a;
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }

        .footer {
            margin-top: 80px;
            padding: 30px;
            font-family: 'Fredoka One', cursive;
            color: #ff85a1;
        }

        /* Floating Decor */
        .heart-float {
            position: absolute;
            font-size: 30px;
            opacity: 0.5;
            animation: floaty 5s infinite ease-in-out;
            z-index: -1;
        }
        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="photography.html">Photography</a>
        <a href="design.html">Design</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="stage">
        <div class="heart-float" style="top: 10%; left: 5%;">💖</div>
        <div class="heart-float" style="top: 15%; right: 10%; animation-delay: 1s;">🌸</div>
        <div class="heart-float" style="bottom: 10%; left: 15%; animation-delay: 2s;">🎀</div>

        <h1>My Photography ✨</h1>

        <div class="photo-hanger">
            <div class="clip"></div>
            
            <div id="slides-wrapper">
                <div class="mySlides">
                    <img src="photo1.png" alt="Photo 1">
                    <div class="caption-box">
                        <div class="caption">Design One 🍓</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo2.png" alt="Photo 2">
                    <div class="caption-box">
                        <div class="caption">Design Two 🍭</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo3.png" alt="Photo 3">
                    <div class="caption-box">
                        <div class="caption">Design Three 🎀</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo4.png" alt="Photo 4">
                    <div class="caption-box">
                        <div class="caption">Design Four ☁️</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo5.png" alt="Photo 5">
                    <div class="caption-box">
                        <div class="caption">Design Five ✨</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo6.png" alt="Photo 6">
                    <div class="caption-box">
                        <div class="caption">Design Six 🧸</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo7.png" alt="Photo 7">
                    <div class="caption-box">
                        <div class="caption">Design Seven 🌸</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo8.png" alt="Photo 8">
                    <div class="caption-box">
                        <div class="caption">Design Eight 🧁</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo9.png" alt="Photo 9">
                    <div class="caption-box">
                        <div class="caption">Design Nine 🍬</div>
                    </div>
                </div>
                <div class="mySlides">
                    <img src="photo10.png" alt="Photo 10">
                    <div class="caption-box">
                        <div class="caption">Design Ten 💗</div>
                    </div>
                </div>
            </div>
            <span id="slide-counter" class="counter">1 / 10</span>
        </div>

        <div class="nav-btns">
            <button class="btn" onclick="plusSlides(-1)">Previous 🧸</button>
            <button class="btn" onclick="plusSlides(1)">Next 🍭</button>
        </div>

        <div class="footer">Created with 💗✨</div>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let counterDisplay = document.getElementById("slide-counter");

            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}
            
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            
            slides[slideIndex-1].style.display = "block";  
            
            // Update the counter text
            counterDisplay.innerHTML = slideIndex + " / " + slides.length;
        }
    </script>

</body>
</html>
